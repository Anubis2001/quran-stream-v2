<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quran Radio (Live HLS)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>🎧 Quran Live Radio</h1>
    <p>Select a channel and press Play</p>

    <div class="select-group">
      <select id="sheikhList"></select>
      <button id="playBtn">Play</button>
    </div>

    <div class="player-card">
      <div id="currentTitle" class="title">No Channel Selected</div>
      <audio id="audioPlayer" controls></audio>
      <p id="broadcastLink"></p>
    </div>
  </div>

  <footer>&copy; 2026 Quran Radio</footer>

  <!-- HLS.js Library -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <script>
    // Load all Sheikhs
    async function loadSheikhs() {
      const response = await fetch("/sheikhs");
      const sheikhs = await response.json();
      const select = document.getElementById("sheikhList");

      sheikhs.forEach(name => {
        const option = document.createElement("option");
        option.value = name;
        option.text = name;
        select.add(option);
      });
    }

    function playLiveHLS() {
      const select = document.getElementById("sheikhList");
      const audio = document.getElementById("audioPlayer");
      const titleEl = document.getElementById("currentTitle");
      const linkEl = document.getElementById("broadcastLink");

      if (!select.value) return;

      const sheikh = select.value;
      // Live playlist from your server, served by Express
      const hlsUrl = `/hls/${sheikh}/live.m3u8`;

      titleEl.textContent = "Now Playing: " + sheikh;
      linkEl.textContent = "Broadcast: " + window.location.origin + hlsUrl;

      // Play HLS using hls.js (works in most browsers)
      if (Hls.isSupported()) {
        const hls = new Hls({
          // optional: tuning for live streams
          liveSyncDuration: 30,
          liveMaxLatencyDuration: 60
        });
        hls.loadSource(hlsUrl);
        hls.attachMedia(audio);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          audio.play();
        });
      } else {
        // Fallback for Safari (native HLS support)
        audio.src = hlsUrl;
        audio.play();
      }
    }

    document.getElementById("playBtn").addEventListener("click", playLiveHLS);

    loadSheikhs();
  </script>

</body>
</html>
